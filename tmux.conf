set -g default-terminal "tmux-256color"
set -as terminal-overrides ",alacritty:RGB,xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g history-limit 100000
setw -g mode-keys vi
set -g escape-time 0

set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -l"

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set -g status-position bottom
set -g status-interval 5
set -g status-style fg="#e0def4",bg="#232136"
set -g message-style fg="#e0def4",bg="#393552"
set -g pane-active-border-style fg="#9ccfd8"
set -g pane-border-style fg="#56526e"

set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#9ccfd8,bold] #S #[fg=#6e6a86]|"
set -g status-right "#[fg=#6e6a86]%Y-%m-%d #[fg=#f6c177]%H:%M #[fg=#6e6a86]| #[fg=#c4a7e7]#h "

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#232136,bg=#9ccfd8,bold] #I:#W "
